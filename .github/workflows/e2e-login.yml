name: E2E Login Smoke Test

on:
  pull_request:
    branches: [main]

jobs:
  login:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      WP_API_URL: https://thecenterbookgr.com/wp-json
      WP_API_USER: ${{ secrets.WP_API_USER }}
      WP_API_PASSWORD: ${{ secrets.WP_API_PASSWORD }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      TEST_STAFF_EMAIL: ${{ secrets.TEST_STAFF_EMAIL }}
      TEST_STAFF_PASSWORD: ${{ secrets.TEST_STAFF_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run e2e login test
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
